services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: calendar_app
      POSTGRES_USER: calendar
      POSTGRES_PASSWORD: calendar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "4318:4318"

volumes:
  postgres_data:
